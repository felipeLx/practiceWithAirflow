version: 2

models:
  - name: fct_claims
    description: "Fact table - all insurance claims with enriched dimensions"
    columns:
      - name: claim_id
        data_tests:
          - unique
          - not_null
      - name: total_claim_amount
        description: "Total claim value in USD"

  - name: dim_customers
    description: "Customer dimension with aggregated metrics"
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
      - name: total_policies
        description: "Count of policies held"
      - name: total_claims
        description: "Count of claims filed"

  - name: dim_policies
    description: "Policy dimension with current status"
    columns:
      - name: policy_id
        data_tests:
          - unique
          - not_null
  - name: fct_claims_incremental
    description: "Incremental fact table - claims processed incrementally by loaded_at"
    columns:
      - name: claim_id
        data_tests:
          - unique
          - not_null
      - name: dbt_loaded_at
        description: "Timestamp when row was loaded by dbt"